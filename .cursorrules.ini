## 🎯 هوية المشروع — القاعدة الذهبية

**PFCC Playground ليست لعبة واحدة — هي ساحة ألعاب جماعية قابلة للتوسع.**

كل لعبة = مجلد مستقل كاملاً. إضافة لعبة جديدة لا تمس أي ملف موجود.

| | 🎭 لعبة الألقاب | 🦅 لعبة صيد القميري |
|---|---|---|
| **الجوهر** | إخفاء الهوية + تخمين الزملاء | Dashboard إدارة + تنافس ثقافي |
| **المشرف** | ينشئ غرفة، يتحكم بالجولات | لوحة تحكم كاملة، يدير المجموعات |
| **المتسابق** | يختار لقب مجهول، يخمن الآخرين | ينتمي لمجموعة، يشارك عبر قائده |
| **Firebase Path** | rooms/ | qrooms/ |
| **بنك الأسئلة** | ❌ لا تحتاجه أبداً | ✅ اختياري (قرار المشرف) |

