## 📢 نظام التسويق والإعلانات

### المبدأ الأساسي
**الماستر يغير مرة واحدة في Firebase — ينعكس فوراً على كل الألعاب.**

### أنواع الإعلانات
| النوع | الوصف | يظهر في |
|---|---|---|
| **كاروسيل الصور** | صور تتعاقب تلقائياً | اللوبي قبل البدء |
| **فيديو إعلاني** | فيديو قصير (YouTube/رابط مباشر) | اللوبي قبل البدء |
| **رعاية الجولة** | شعار + نص يظهر بين الجولات | أثناء اللعب |

### مكون LobbyAd.jsx — الاستخدام في أي لعبة
```jsx
// في أي لوبي — سطر واحد فقط
{showAd && <LobbyAd onDone={() => setShowAd(false)} />}

// LobbyAd يقرأ من Firebase تلقائياً
// إذا active=false → يستدعي onDone() مباشرة
// إذا active=true  → يعرض carousel أو video حسب type
```

