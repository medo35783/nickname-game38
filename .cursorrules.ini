## 📚 بنك الأسئلة المركزي

### من يستخدمه
| اللعبة | يستخدم البنك؟ |
|---|---|
| 🎭 الألقاب | ❌ لا — أبداً |
| 🦅 القميري | ✅ اختياري — قرار المشرف عند إنشاء الغرفة |
| 🎮 ألعاب جديدة | ✅ حسب طبيعة اللعبة |

### آلية القميري مع البنك
المشرف في `FameeriSetup.jsx` يختار مصدر الأسئلة:
```
مصدر الأسئلة:
◉ أسئلة من عندي      ← يكتبها يدوياً أثناء اللعب
○ البنك المركزي      ← يظهر له خياران:
    ├── تلقائي: اختر تصنيف + صعوبة → تجيه الأسئلة تلقائياً
    └── يدوي:   تصفح البنك واختر الأسئلة بنفسك
```

### useQuestions Hook
```javascript
// فقط في الألعاب التي تحتاج أسئلة
import { useQuestions } from '../../question-bank/useQuestions';

// القميري — تلقائي بالتصنيف
const questions = useQuestions({ gameType: 'fameeri', category: 'تراث', difficulty: 'medium' });

// القميري — يدوي (المشرف اختار بنفسه)
const questions = useQuestions({ ids: selectedQuestionIds });

// ❌ الألقاب لا تستدعي useQuestions أبداً
```

### لوحة إدارة البنك (QBankManager) — للماستر فقط
- إضافة / تعديل / حذف أسئلة
- تصنيفات: تراث، رياضة، علوم، عام، ...
- تحديد الصعوبة والألعاب المناسبة
- موافقة على الأسئلة المقترحة من المجتمع

