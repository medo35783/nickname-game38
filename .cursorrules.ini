## 🔐 نظام الأكواد والاشتراكات

### نقطة ربط ماي فاتورة
`auth/CodeActivation.jsx` هو الملف الوحيد الذي يتكامل مع بوابة الدفع.
المشرف يدفع عبر ماي فاتورة ← يحصل على كود ← يفعّله في التطبيق ← يشتغل.

```
المشرف يدفع (ماي فاتورة)
    ↓
يحصل على كود (مثال: A7X2)
    ↓
CodeActivation.jsx يتحقق من codes/ في Firebase
    ↓
يُخزَّن في localStorage: 'code_active_pfcc'
    ↓
المشرف يستطيع إنشاء غرف
```

---

## 📋 قواعد التطوير — لا تُخالَف أبداً

### القاعدة 1: مسؤولية الملف
**كل ملف = مسؤولية واحدة واضحة — الحجم يتبع المحتوى وليس العكس**

| الملف | يحتوي على | علامة الخطر |
|---|---|---|
| `App.jsx` | routing فقط | أي منطق لعبة داخله |
| `core/firebase.js` | إعداد Firebase فقط | أي initializeApp في مكان آخر |
| `TitlesGame.jsx` | منسق الألقاب فقط | منطق القميري داخله |
| `FameeriGame.jsx` | منسق القميري فقط | منطق الألقاب داخله |
| `CodeActivation.jsx` | تفعيل الكود فقط | منطق دفع أو لعبة داخله |

**علامة الخطر:** إذا وجدت ملفاً يحتوي على مسؤوليتين → افصله فوراً بغض النظر عن عدد الأسطر.

### القاعدة 2: الاستيراد من المصدر الصحيح
```javascript
// ✅ صح
import { db } from '../../core/firebase';
import { genCode } from '../../core/helpers';
import { COLORS } from '../../core/constants';

// ❌ خطأ — لا تعرّف Firebase في أكثر من مكان
const app = initializeApp(firebaseConfig); // فقط في core/firebase.js
```

### القاعدة 3: الـ State
```javascript
// App.jsx يحتوي فقط على:
// routing + state عام + Navigation — بدون أي منطق لعبة أو UI
const [tab, setTab] = useState('game');
const [selectedGame, setSelectedGame] = useState(null);

// كل لعبة تدير state خاصة بها داخل ملفها
```

### القاعدة 4: Firebase Listeners — لا تنسَ cleanup
```javascript
useEffect(() => {
  const gRef = gameRef(roomCode);
  const unsub = onValue(gRef, snap => setData(snap.val()));
  return () => off(gRef); // ← لا تنسَ هذا أبداً
}, [roomCode]);
```

### القاعدة 5: إضافة لعبة جديدة — الطريقة الصحيحة
```javascript
// خطوة 1: أنشئ مجلد games/newgame/
// خطوة 2: أضف في Home.jsx بطاقة اللعبة
// خطوة 3: أضف في App.jsx سطرين فقط:
import NewGame from './games/newgame/NewGame';
// { selectedGame === 'newgame' && <NewGame /> }

// ❌ لا تمس أي ملف آخر
```

### القاعدة 6: بنك الأسئلة — من يستدعيه
```javascript
// ✅ صح — فقط الألعاب التي تحتاج أسئلة
// FameeriSetup.jsx (إذا اختار المشرف البنك)
import { useQuestions } from '../../question-bank/useQuestions';

// ❌ خطأ — الألقاب لا تلمس question-bank أبداً
// TitlesGame.jsx لا يستورد من question-bank
```

