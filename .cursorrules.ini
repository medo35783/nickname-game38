## ⚠️ أخطاء يجب تجنبها

1. **App.jsx** — لا تضع فيه منطق لعبة، هو routing فقط
2. **state** — لا تخلط state الألقاب مع state القميري
3. **Firebase cleanup** — لا تنسَ `return () => off(ref)` أبداً
4. **Firebase init** — `initializeApp` فقط في `core/firebase.js`
5. **localStorage** — لا تحفظ بيانات حساسة، فقط IDs وcodes
6. **لعبة جديدة** — لا تمس ملفات اللعب الموجودة
7. **التسويق** — منطقه فقط في `marketing/`، الألعاب تستخدم `<LobbyAd/>` فقط
8. **بنك الأسئلة** — الألقاب لا تلمسه أبداً، القميري يستدعيه فقط إذا اختار المشرف البنك
9. **ماي فاتورة** — التكامل فقط في `auth/CodeActivation.jsx`، لا في أي ملف آخر

