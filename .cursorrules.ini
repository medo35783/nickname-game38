## 🗄️ Firebase Database Schema

### مسارات لعبة الألقاب
```
rooms/{roomCode}/
  game/
    phase: 'lobby' | 'attacking' | 'revealing' | 'ended'
    nickMode: 1 | 2
    roundNum: number
    deadline: timestamp
    attacksPerRound: number
    poisonNick: string
    specialRound: number
    silentActive: boolean
  players/{playerId}/
    name, nick, nick2, status, colorIdx, initials
  currentRound/attacks/{attackId}/
    attackerNick, targetNick, correct, ts
  rounds/{roundIndex}/
    round, attacks: {...}
```

### مسارات لعبة القميري
```
qrooms/{roomCode}/
  game/
    phase: 'lobby' | 'distributing' | 'playing' | 'ended'
    showResult: boolean
    lastResult/ { result, hunted, weapon, tree, ... }
    timer/ { deadline }
    questionSource: 'custom' | 'bank'     ← مصدر الأسئلة (قرار المشرف)
  groups/{groupId}/
    name, leaderId, trees: {0..10: number}, score
  members/{memberId}/
    name, groupId, role: 'leader' | 'member'
  attacks/{attackId}/
    groupId, tree, weapon, result, ts
```

### مسارات نظام الأكواد
```
codes/{codeString}/
  createdAt, expiresAt
  type: 'free_3h' | 'monthly' | 'yearly'
  usedBy: userId
  usedAt: timestamp
  stats/
    totalSessions, totalRounds
    games/{sessionId}/
      gameType, startedAt, rounds, players
```

### مسارات نظام التسويق
```
marketing/
  carousel/
    {id}/ { img: url, title, link, order }
  video/
    url, autoplay, duration
  lobbyAd/
    active: boolean
    type: 'carousel' | 'video' | 'both'
    showSeconds: number        ← مدة الظهور قبل البدء
    skipAllowed: boolean       ← هل يُسمح بالتخطي
  sponsorship/
    {roundId}/ { logo, text, gameTypes: ['titles','fameeri'] }
```

### مسارات بنك الأسئلة
```
question-bank/
  {questionId}/
    text: string
    category: 'تراث' | 'رياضة' | 'عام' | ...
    difficulty: 'easy' | 'medium' | 'hard'
    gameTypes: ['fameeri', 'all']          ← الألقاب لا تُدرج هنا أبداً
    answer: string
    options: [string]                      ← للأسئلة متعددة الاختيار
    createdBy: userId
    approved: boolean
```

