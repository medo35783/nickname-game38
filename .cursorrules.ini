## 👥 نظام المستخدمين والصلاحيات

```
المستخدمون:
│
├── 🔴 Domain Admin (pfcc_is_admin = true)
│     ← لا يحتاج كود
│     ← يستطيع إنشاء أكواد
│     ← يرى إحصائيات كل الأكواد
│     ← يتحكم بنظام التسويق (ماستر)
│     ← يدير بنك الأسئلة
│     ← يستطيع استخدام كل الألعاب
│
├── 🟡 مشرف عادي (لديه كود صالح)
│     ← يُفعّل كود → ينشئ غرف → يدير اللعب
│     ← الكود يتبعه هو (مرتبط بـ userId)
│     ← يرى إحصائيات غرفه فقط
│
└── 🟢 متسابق (لا يحتاج كود أبداً)
      ← ينضم برقم الغرفة فقط
      ← لا تسجيل دخول
```

### localStorage Keys الثابتة
```javascript
'ng_session'          // جلسة لعبة الألقاب
'qumairi_ng'          // جلسة لعبة القميري
'pfcc_is_admin'       // هل المستخدم admin (domain)
'code_active_pfcc'    // الكود المُفعَّل
```

