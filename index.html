<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" id="pwa-theme-color" content="#0a1628" />
    <script>
      (function () {
        try {
          var k = 'ng_theme';
          var s = localStorage.getItem(k);
          var dark =
            s === 'dark' ? true : s === 'light' ? false : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
          var meta = document.getElementById('pwa-theme-color');
          if (meta) meta.setAttribute('content', dark ? '#0a1628' : '#eef3f9');
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <title>لعيب زون — La3ib Zone</title>
    <meta name="description" content="لعيب زون | جَوّك، جمعتك، وتحديك — ألعاب جماعية تفاعلية للرحلات والاجتماعات والمناسبات" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="لعيب زون" />
    <link rel="icon" type="image/png" sizes="512x512" href="/brand/la3ibz-icon-mark.png?v=17" />
    <link rel="apple-touch-icon" href="/brand/la3ibz-pwa-192.png?v=1" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
